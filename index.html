    /**
     * トークンからスタンプ番号(1〜N)を検索します。
     * STAMP_CONFIGS の各要素に `code` を設定してください。
     */
    function findStampNumberByToken(code) {
      if (!code) return null;
      // CryptoJS must be available (loaded via CDN). Compute MD5 of incoming code.
      if (typeof CryptoJS === 'undefined' || !CryptoJS.MD5) {
        console.warn('CryptoJS not available; cannot match MD5 tokens.');
        return null;
      }

      // Normalize incoming code: strip optional prefix like "s1_" (case-insensitive)
      const originalCode = String(code);
      const normalizedCode = originalCode.replace(/^s\d+_/i, '');
      const hashed = CryptoJS.MD5(normalizedCode).toString();
      const hashedOriginal = CryptoJS.MD5(originalCode).toString();

      for (let i = 0; i < STAMP_CONFIGS.length; i++) {
        const cfg = STAMP_CONFIGS[i] || {};

        // cfg.code は、ハッシュ化される前の平文か、MD5ハッシュ値のどちらかです。
        if (cfg.code && typeof cfg.code === 'string') {
          const cfgStr = String(cfg.code);
          // 32文字の16進数であれば、MD5ハッシュ値として扱う
          if (/^[a-f0-9]{32}$/i.test(cfgStr)) {
            const cfgToken = cfgStr.toLowerCase();
            if (cfgToken === hashed || cfgToken === hashedOriginal) return i + 1;
          } else {
            // 平文の場合: ハッシュ化して比較
            const cfgHash = CryptoJS.MD5(cfgStr).toString();
            if (cfgHash === hashed || cfgHash === hashedOriginal) return i + 1;
          }
        }
      }
      return null;
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);

    function nowMs() {
      return Date.now();
    }

    function daysToMs(days) {
      return days * 24 * 60 * 60 * 1000;
    }

    // ===== localStorage管理 =====

    function initState() {
      const obj = {
        stamps: "0".repeat(STAMP_COUNT),
        updatedAt: nowMs(),
        // 報酬受け取り済みフラグ（端末ごと）
        rewardClaimed: false
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
      return obj;
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      const now = nowMs();

      if (!raw) return initState();

      try {
        const obj = JSON.parse(raw);

        if (
          !obj ||
          typeof obj.stamps !== "string" ||
          obj.stamps.length !== STAMP_COUNT ||
          typeof obj.updatedAt !== "number"
        ) {
          return initState();
        }

        // 以前のバージョンには存在しない場合があるので既定値を補う
        if (typeof obj.rewardClaimed !== 'boolean') obj.rewardClaimed = false;

        if (now - obj.updatedAt > daysToMs(EXPIRATION_DAYS)) {
          // 有効期限切れ → リセット
          return initState();
        }
        return obj;
      } catch (e) {
        // 破損していたらリセット
        return initState();
      }
    }

    function saveState(state) {
      state.updatedAt = nowMs();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function addStamp(index, state) {
      // index: 0〜11
      const chars = state.stamps.split("");
      chars[index] = "1";
      state.stamps = chars.join("");
      saveState(state);
      return state;
    }

    function renderStampGrid(stamps) {
      const $grid = $("#stamp-grid");
      $grid.empty();

      for (let i = 0; i < STAMP_COUNT; i++) {
        const collected = stamps.charAt(i) === "1";

        const $stamp = $("<div>")
          .addClass("stamp")
          .toggleClass("collected", collected)
          .attr("data-index", i + 1);

        // 各スタンプの設定をまとめた STAMP_CONFIGS を参照
        const cfg = (Array.isArray(STAMP_CONFIGS) && STAMP_CONFIGS[i]) ? STAMP_CONFIGS[i] : {};
        const nameText = cfg.name || "";
        const link = cfg.link || "";

        let $number;
        if (link) {
          $number = $("<div>").addClass("stamp-number");
          const $a = $("<a>")
            .attr('href', link)
            .attr('target', '_blank')
            .attr('rel', 'noopener')
            //.text("No." + (i + 1) + " " + nameText);
            .text(nameText);
          $number.append($a);
        } else {
          $number = $("<div>")
            .addClass("stamp-number")
            //.text("No." + (i + 1) + " " + nameText);
            .text(nameText);
        }

        const $imageWrapper = $("<div>").addClass("stamp-image-wrapper");
        const imgSrc = collected
          ? (cfg.on || "")
          : (cfg.off || "");

        const $img = $("<img>")
          .attr("alt", collected ? "取得済みスタンプ" : "未取得スタンプ");

        if (imgSrc) {
          $img.attr("src", imgSrc);
        } else {
          // 画像パスが未設定の場合の簡易表示（枠だけ使う）
          $img.css({ opacity: 0 });
        }

        $imageWrapper.append($img);

        const $label = $("<div>")
          .addClass("stamp-label")
          .text(collected ? "GET!" : "未取得");

        //$stamp.append($number, $imageWrapper, $label);
        $stamp.append($number, $imageWrapper);
        $grid.append($stamp);
      }
    }

    function checkComplete(st) {
      // 引数は文字列（stamps）か、stateオブジェクトのどちらかで渡される可能性がある。
      // まずそれを正しく扱うために文字列を抽出する。
      let stampsStr = null;
      let stateObj = null;

      if (st && typeof st === 'object' && typeof st.stamps === 'string') {
        stateObj = st;
        stampsStr = st.stamps;
      } else if (typeof st === 'string') {
        stampsStr = st;
      }

      // stampsStr が "0" を含まない＝すべてのスタンプが押されている状態をチェック
      const collectedCount = (stampsStr.match(/1/g) || []).length;
      if (stampsStr && stampsStr.length > 0 && collectedCount >= REWORD_STAMP_NUM) {
        // stateObj がない場合は保存された状態を読み込んで rewardClaimed を確認する
        if (!stateObj) stateObj = loadState();

        if (stateObj && stateObj.rewardClaimed) {
          showMessage("景品は既に受け取り済みです。", "success", false);
        } else {
        // 自動受取モードが有効な場合は、クリック可能な受取リンクを表示しない
         if (typeof REWARD_AUTO_CLAIM_ENABLED !== 'undefined' && REWARD_AUTO_CLAIM_ENABLED) {
          showMessage("🎉🎉🎉景品がもらえます🎉🎉🎉", "success", false);
        } else {
          const html = '🎉景品がもらえます🎉　<a href="#" id="claim-reward">係りの人に画面を見せてね</a>';
          showMessage(html, "success", false);
          // ハンドラを設定
          $(document).off('click', '#claim-reward').on('click', '#claim-reward', function (e) {
            e.preventDefault();
            if (confirm("景品をもらいますか？\n間違えてクリックした人は「キャンセル」を選んでね！")) {
              claimReward(stateObj);
            }
          });
        }
      }
    }

    function claimReward(state) {
      if (!state) state = loadState();
      if (state.rewardClaimed) {
        showMessage('この端末ではすでに景品を受け取り済みです。', 'info', false);
        return;
      }
      state.rewardClaimed = true;
      saveState(state);
      showMessage('景品をGetしました！参加いただきありがとうございます', 'success', false);
      // メッセージ表示を更新
      renderStampGrid(state.stamps);
    }

    // 震えるギミック用ユーティリティ
    function triggerShake($stamp) {
      if (!$stamp || !$stamp.length) return;
      // remove then re-add to retrigger animation when clicked multiple times
      $stamp.removeClass('shake');
      // small timeout to allow reflow so animation restarts
      setTimeout(function () {
        $stamp.addClass('shake');
      }, 10);

      // cleanup after animation ends (fallback timeout)
      $stamp.one('animationend webkitAnimationEnd', function () {
        $stamp.removeClass('shake');
      });

      setTimeout(function () {
        $stamp.removeClass('shake');
      }, 800);
    }

    function triggerShakeByIndex(index) {
      var $s = $('.stamp[data-index="' + index + '"]');
      if ($s.length) triggerShake($s);
    }

    /**
     * 押印数に応じてヘッダー右のアイコンを更新する
     */
    function updateRewardStatusIcon(collectedCount) {
      const $iconContainer = $("#reward-status-icon");
      if (!$iconContainer.length) return;

      // 降順にソートされている前提で、最初に見つかったものを適用
      const configToShow = REWARD_STATUS_CONFIG.find(config => collectedCount >= config.threshold);

      if (configToShow) {
        const $img = $("<img>")
          .attr("src", configToShow.image)
          .attr("alt", configToShow.message)
          .attr("title", configToShow.message);
        $iconContainer.empty().append($img);

        // アニメーションクラスを適用
        if (configToShow.animation) {
          $img.addClass(`anim-${configToShow.animation}`);
        }

        // モーダル表示用にデータを保存
        $iconContainer.data("currentConfig", configToShow);
        $iconContainer.css("cursor", "pointer");
      } else {
        $iconContainer.empty(); // 該当なしの場合は空にする
        $iconContainer.removeData("currentConfig");
        $iconContainer.css("cursor", "default");
      }
    }

        // すべてのスタンプが揃った場合
        $stampMessage.text(STAMP_COUNT + "個すべてのスタンプがそろいました！");
      } else {
        // まだスタンプが揃っていない場合
        //$stampMessage.html('スタンプ' + collected + '</span>個押しました！残り' + remaining + '個です。');
        $stampMessage.html('スタンプ' + collected + '</span>個押しました！残り' + remaining + '個です。');
      }

      // ヘッダーアイコンを更新
      updateRewardStatusIcon(collected);
    }


    //const MARQUEE_TEXT = '各会場のQRコードを読み取るとスタンプがたまります。';
    //const MARQUEE_SPEED_SEC = 20; // smaller = faster
    /**
     * マーキーのテキストと速度を設定します。
     * jquery.marquee.min.js を使用します。
     * @param {string} text 表示するテキスト
     * @param {number} speedPxPerSec 1秒間に進むピクセル数
     */
    function setMarquee(text, speedPxPerSec) {
      const $marquee = $('.marquee');
      if (!$marquee.length) return;

      // 以前のインスタンスがあれば破棄
      if ($marquee.data('marquee')) {
        $marquee.marquee('destroy');
      }

      // テキストを更新
      $marquee.text(text);

      // 速度を px/sec から プラグインの speed (ms/px) に変換
      // 例: 30px/sec -> 1000ms / 30px = 33.33 ms/px
      const speedMsPerPixel = 1000 / speedPxPerSec;

      // プラグインを初期化
      $marquee.marquee({
        speed: speedMsPerPixel,
        gap: 50,
        delayBeforeStart: 0,
        direction: 'left',
        duplicated: true, // 連続して流れるように複製する
        pauseOnHover: true
      });
    }

    $(function () {
      //setMarquee(MARQUEE_TEXT, MARQUEE_SPEED_SEC);
      //setMarquee('各会場のQRコードを読み取るとスタンプがたまります。',MARQUEE_SPEED_SEC);

      // notice.txt からテキストを読み込んでマーキーに設定
      $.get('notice.txt')
        .done(function(data) {
          setMarquee(data, MARQUEE_SPEED_SEC);
        })
        .fail(function() {
          setMarquee('各会場のQRコードを読み取るとスタンプがたまります。', MARQUEE_SPEED_SEC);
        });
      
      // 状態ロード（必要なら14日でリセット）
      let state = loadState();

      // スタンプの押印数と残り数を更新
      updateStampCounters(state);      

      // デバッグ用: URLクエリでリセットできるようにする (?reset=1 or ?reset=true)
      const resetParam = getQueryParam(QUERY_PARAM_RESET);
      let skipTokenProcessing = false;
      if (resetParam) {
        const val = String(resetParam).toLowerCase();
        if (val === "1" || val === "true" || val === "yes") {
          state = initState();
          showMessage("デバッグ: スタンプをリセットしました。", "info");
          // リセット指定があるときは同時にcode処理を行わない（誤操作防止）
          skipTokenProcessing = true;
        }
      }
      // QRコードからのアクセスかチェック（?code=xxx）
      const code = getQueryParam(QUERY_PARAM_CODE);
      let spotNumber = null;

      // まず自動報酬受け取りモードが有効かつ code が指定されている場合の処理
      if (code && REWARD_AUTO_CLAIM_ENABLED) {
        if (typeof CryptoJS !== 'undefined' && CryptoJS.MD5) {
          const codeHash = CryptoJS.MD5(String(code)).toString();
          // REWARREWUTO_CODE は MD5後の値を設定する想定。
          // ただし運用上、受け取った code が既にハッシュ値の場合もあるため
          // 以下のどちらかを満たせば一致と見なす:
          //  - codeHash === REWARD_AUTO_CODE  (code が平文 -> ハッシュ化して比較)
          //  - String(code) === REWARD_AUTO_CODE (code がすでにハッシュ値)
          const directMatch = String(code) === REWARD_AUTO_CODE;
          const hashMatch = codeHash === REWARD_AUTO_CODE;
          console.debug('Reward auto-check', { code, codeHash, REWARD_AUTO_CODE, directMatch, hashMatch });

          if (directMatch || hashMatch) {
            // 指定されたリワード用 code でアクセスされたときの自動付与処理
            if (state && typeof state.stamps === 'string' && !state.stamps.includes('0')) {
              if (!state.rewardClaimed) {
                state.rewardClaimed = true;
                saveState(state);
                showMessage('景品GET！スタンプラリーに参加していただきありがとうございます', 'success');
              } else {
                showMessage('この端末ではすでに景品を受け取り済みです。', 'warning');
              }
            } else {
              showMessage('スタンプがすべて揃っていません。', 'warning');
            }
            // 自動付与コードに一致したら、通常のスタンプ処理は行わない
            skipTokenProcessing = true;
          }
        } else {
          console.warn('CryptoJS not available; cannot perform reward auto-check');
        }
      }

      if (!skipTokenProcessing && code) {
        spotNumber = findStampNumberByToken(code); // 1〜N or null
        if (spotNumber && spotNumber >= 1 && spotNumber <= STAMP_COUNT) {
          const index = spotNumber - 1;
          const already = state.stamps.charAt(index) === "1";
          state = addStamp(index, state);
          
          // スタンプの押印数と残り数を更新
          updateStampCounters(state);      

          if (already) {
            showMessage(STAMP_CONFIGS[index].name + " のスタンプはすでに取得済みです。", "warning");
          } else {
            showMessage(STAMP_CONFIGS[index].name + " のスタンプを獲得しました！", "success");

            const marqueeMsg = `${STAMP_CONFIGS[index].msg}`;
            //setMarquee(marqueeMsg, 15); // 第2引数でスクロール速度(秒)を調整
            setMarquee(marqueeMsg,MARQUEE_SPEED_SEC);        // 同じ速度
            // setMarquee(marqueeMsg, 60); // 遅くしたい場合（px/secを下げる）
          }
        } else {
          showMessage("不正なスタンプコードが指定されました。", "warning");
        }
      }

      // グリッド描画
      renderStampGrid(state.stamps);

      // スタンプの押印数と残り数を更新
      updateStampCounters(state);      

      // コンプリート判定（state オブジェクトを渡す）
      if (CHECK_COMPLETE_ENABLED) {
        checkComplete(state);
      }

      // モーダル関連のイベントリスナー
      $(document).on("click", "#reward-status-icon", function() {
        const config = $(this).data("currentConfig");
        if (config) {
          $("#modal-reward-image").attr("src", config.image);
          $("#modal-reward-message").text(config.message);
          $("#reward-modal").addClass("show");
        }
      });

      $("#modal-close-btn, #reward-modal").on("click", function(e) {
        // 背景クリックまたは閉じるボタンで閉じる
        if (e.target === this || e.target.id === "modal-close-btn") {
          $("#reward-modal").removeClass("show");
        }
      });

      // クリックで震えるギミック
      $(document).on('click', '.stamp', function () {
        triggerShake($(this));
      });

      // QRで取得した場合はそのスタンプを震わせてフィードバック
      if (spotNumber && spotNumber >= 1 && spotNumber <= STAMP_COUNT) {
        triggerShakeByIndex(spotNumber);

        // 該当のスタンプまでスクロール（画面下部にある場合などに見逃さないように）
        const $target = $('.stamp[data-index="' + spotNumber + '"]');
        if ($target.length) {
          $('html, body').animate({
            scrollTop: $target.offset().top - 150
          }, 600);
        }
      }
      
      // ホームリンクのhrefを現在のページURLに設定
      $("#home-link").attr("href", CURRENT_PAGE_URL);

      // ===== QRコードリーダーの初期化 =====
      const qrReaderElement = document.getElementById("qr-reader");
      const startButton = document.getElementById("start-qr-reader");
      let isScanning = false;

      if (!qrReaderElement || !startButton) return;

      const html5QrCode = new Html5Qrcode("qr-reader");

      // カメラを停止する共通処理
      const stopScanning = () => {
        if (!isScanning) return;
        html5QrCode.stop().then((ignore) => {
          console.log("QR Code scanning is stopped.");
          $("#qr-reader").slideUp();
          $(startButton).text("QRコードを読み取る").removeClass("scanning").prop('disabled', false);
          isScanning = false;
        }).catch((err) => {
          console.error("Failed to stop QR Code scanning.", err);
          // エラーが発生してもUIを元に戻す
          $("#qr-reader").slideUp();
          $(startButton).text("QRコードを読み取る").removeClass("scanning").prop('disabled', false);
          isScanning = false;
        });
      };

      const qrCodeSuccessCallback = (decodedText, decodedResult) => {
        // 読み取り成功時の処理
        console.log(`Code matched = ${decodedText}`, decodedResult);
        stopScanning(); // カメラを停止

        // URLからパラメータを抽出してページをリロード
        try {
          const url = new URL(decodedText);
          const code = url.searchParams.get(QUERY_PARAM_CODE);
          const reset = url.searchParams.get(QUERY_PARAM_RESET);

          if (code) {
            window.location.href = `${CURRENT_PAGE_URL}?${QUERY_PARAM_CODE}=${encodeURIComponent(code)}`;
          } else if (reset) {
            window.location.href = `${CURRENT_PAGE_URL}?${QUERY_PARAM_RESET}=${encodeURIComponent(reset)}`;
          } else {
            showMessage("このQRコードには有効なスタンプ情報が含まれていません。", "warning");
          }
        } catch (e) {
          showMessage("無効なQRコードです。", "warning");
        }
      };

      /*
      window.addEventListener("resize", () => {
        const current = document.getElementById("marquee1")?.textContent ?? "";
        if (current) setMarquee(current, MARQUEE_SPEED_SEC);
      });
      */
      $(startButton).on('click', function () {
        if (isScanning) {
          // スキャン中にボタンが押されたら、スキャンを停止する
          stopScanning();
        } else {
          // スキャンを開始する
          isScanning = true;
          $(this).text("カメラを閉じる").addClass("scanning").prop('disabled', false);
          $("#qr-reader").slideDown();
          html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, qrCodeSuccessCallback)
            .catch(err => {
              console.error("Unable to start scanning.", err);
              showMessage("カメラの起動に失敗しました。", "warning");
              stopScanning(); // 失敗時もUIを元に戻す
            });
        }
      });
    });
  </script>
</main>
