<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタンプラリー - QRコード一覧</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    .origin-selector,
    .link-list {
      max-width: 1200px;
      margin: 0 auto 24px;
      padding: 16px 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .origin-selector h2,
    .link-list h2 {
      margin: 0 0 12px 0;
      font-size: 1rem;
      color: #333;
    }
    .origin-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
    }
    .origin-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: #333;
    }
    .origin-option input {
      margin: 0;
    }
    .stamp-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .stamp-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .stamp-item {
      background: white;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .stamp-item h3 {
      margin: 0 0 15px 0;
      color: #333;
    }
    .qr-code {
      display: inline-block;
      padding: 10px;
      background: white;
      border-radius: 4px;
      margin-bottom: 15px;
      width: 150px;
      text-align: center;
    }
    .qr-code canvas {
      display: block;
    }
    .stamp-item a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .stamp-item a:hover {
      background-color: #0056b3;
    }
    .code-value,
    .md5-hash {
      font-size: 0.8rem;
      color: #555;
      word-break: break-all;
      margin-top: 5px;
      padding: 5px;
      border-radius: 4px;
    }
    .code-value {
      margin-top: 15px;
      background: #f8f9fa;
    }
    .md5-hash {
      background: #eee;
    }
    .link-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .link-list li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .link-list a {
      color: #007bff;
      text-decoration: none;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center;">スタンプラリー - QRコード一覧</h1>

  <div class="origin-selector">
    <h2>INDEX_URL のベースURL</h2>
    <div class="origin-options">
      <label class="origin-option">
        <input type="radio" name="base-origin" value="https://stamp.ganvalue.com/docs/">
        <span>https://stamp.ganvalue.com/docs/</span>
      </label>
      <label class="origin-option">
        <input type="radio" name="base-origin" value="https://kanasoh.github.io/stamp/">
        <span>https://kanasoh.github.io/stamp/</span>
      </label>
    </div>
    <p id="index-url-preview" style="margin: 12px 0 0; font-size: 0.9rem; color: #555; word-break: break-all;"></p>
  </div>

  <div class="stamp-list" id="stamp-list"></div>

  <p style="text-align: center; margin-top: 30px;">
    上記のQRコードを読み取るか、リンクをクリックしてスタンプを獲得してください。
  </p>

  <p style="text-align: center; margin-top: 30px; font-size: 0.9rem;">
    <a id="reset-link" href="#" style="color: #666; text-decoration: underline;">スタンプをリセット</a>
  </p>

  <div id="generated-link-list" class="link-list"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    const STAMPS = [
      { number: 1, code: "9f7e6a2cbd31" },
      { number: 2, code: "7a1b3e5f9b42" },
      { number: 3, code: "5d8q1a2b7c93" },
      { number: 4, code: "3e3a7c1b5d84" },
      { number: 5, code: "8cdb7a1f3d65" },
      { number: 6, code: "1b0d3f9a2c86" },
      { number: 7, code: "4a931b7d3e58" },
      { number: 8, code: "6f1ppc9b7d24" },
      { number: 9, code: "2d70oa9c3f85" },
      { number: 10, code: "7cp01a9b2d64" },
      { number: 11, code: "9by63d7c5f42" },
      { number: 12, code: "3f7dzt9c5b86" },
      { number: 13, code: "4a8clo7d1f93" }
    ];

    const BASE_ORIGIN_OPTIONS = [
      "https://stamp.ganvalue.com/docs/",
      "https://kanasoh.github.io/stamp/"
    ];

    const defaultOrigin = BASE_ORIGIN_OPTIONS[0];

    function getSelectedOrigin() {
      return $('input[name="base-origin"]:checked').val() || defaultOrigin;
    }

    function buildUrls() {
      const origin = getSelectedOrigin();
      const INDEX_URL = new URL("index.html", origin).href;
      return {
        INDEX_URL,
        BASE_URL: `${INDEX_URL}?code=`,
        RESET_URL: `${INDEX_URL}?reset=true`
      };
    }

    function findStampHash(code) {
      if (typeof CryptoJS === "undefined" || !CryptoJS.MD5) return "";
      return CryptoJS.MD5(String(code)).toString();
    }

    function renderStampItems() {
      const { BASE_URL, RESET_URL, INDEX_URL } = buildUrls();
      const $stampList = $("#stamp-list");
      const $generatedLinkList = $("#generated-link-list");
      const $preview = $("#index-url-preview");

      $stampList.empty();
      $generatedLinkList.empty();
      $preview.text(`INDEX_URL: ${INDEX_URL}`);

      $.each(STAMPS, function (_, stamp) {
        const url = BASE_URL + stamp.code;
        const $item = $("<div>").addClass("stamp-item");
        const $title = $("<h3>").text(`No.${stamp.number}`);
        const $qrContainer = $("<div>")
          .addClass("qr-code")
          .attr("id", `qr-${stamp.number}`);
        const $codeDisplay = $("<div>").addClass("code-value").text("Code: " + stamp.code);
        const $md5Display = $("<div>").addClass("md5-hash").text("MD5: " + findStampHash(stamp.code));
        const $link = $("<a>")
          .attr("href", url)
          .attr("target", "_blank")
          .attr("rel", "noopener")
          .text("リンクで開く");

        $item.append($title, $qrContainer, $codeDisplay, $md5Display, $link);
        $stampList.append($item);

        new QRCode($qrContainer[0], {
          text: url,
          width: 150,
          height: 150,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      });

      const $resetItem = $("<div>").addClass("stamp-item reset");
      const $resetTitle = $("<h3>").text("スタンプをリセット");
      const $resetQrContainer = $("<div>").addClass("qr-code").attr("id", "qr-reset");
      const $resetLink = $("<a>")
        .attr("href", RESET_URL)
        .attr("target", "_blank")
        .attr("rel", "noopener")
        .text("リンクで開く");

      $resetItem.append($resetTitle, $resetQrContainer, $resetLink);
      $stampList.append($resetItem);

      new QRCode($resetQrContainer[0], {
        text: RESET_URL,
        width: 150,
        height: 150,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      $("#reset-link").attr("href", RESET_URL);

      const $linkTitle = $("<h2>").text("QRコードリンク一覧");
      const $linkItems = $("<ul>");

      $.each(STAMPS, function (_, stamp) {
        const url = BASE_URL + stamp.code;
        const $li = $("<li>");
        const $a = $("<a>")
          .attr("href", url)
          .attr("target", "_blank")
          .attr("rel", "noopener")
          .text(url);

        $li.append($a);
        $linkItems.append($li);
      });

      $linkItems.append(
        $("<li>").append(
          $("<a>")
            .attr("href", RESET_URL)
            .attr("target", "_blank")
            .attr("rel", "noopener")
            .text(RESET_URL)
        )
      );

      $generatedLinkList.append($linkTitle, $linkItems);

      return INDEX_URL;
    }

    function syncRadioSelection() {
      const selectedOrigin = getSelectedOrigin();
      const $radio = $(`input[name="base-origin"][value="${selectedOrigin}"]`);
      if ($radio.length) {
        $radio.prop("checked", true);
      } else {
        $('input[name="base-origin"]').first().prop("checked", true);
      }
    }

    $(function () {
      syncRadioSelection();
      renderStampItems();

      $(document).on("change", 'input[name="base-origin"]', function () {
        renderStampItems();
      });
    });
  </script>
</body>
</html>
